<body style="background-color: black;">

  <!-- ── Loading Screen ── -->
  <div id="loading-screen">
    <div class="loader-wrap">
      <div class="loader-ring"></div>
      <div class="loader-ring loader-ring--2"></div>
      <div class="loader-ring loader-ring--3"></div>
      <div class="loader-initials">JWH</div>
    </div>
    <p class="loader-text">載入中<span class="dots"><span>.</span><span>.</span><span>.</span></span></p>
  </div>

  <style>
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.8rem;
      transition: opacity 0.7s ease, visibility 0.7s ease;
    }
    #loading-screen.fade-out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* ── Rings ── */
    .loader-wrap {
      position: relative;
      width: 110px;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .loader-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #2ecce0;
      animation: spin 1.2s linear infinite;
    }
    .loader-ring--2 {
      inset: 14px;
      border-top-color: transparent;
      border-right-color: #fa7c49;
      animation-duration: 1.8s;
      animation-direction: reverse;
    }
    .loader-ring--3 {
      inset: 28px;
      border-top-color: transparent;
      border-bottom-color: #fccf31;
      animation-duration: 2.4s;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Initials ── */
    .loader-initials {
      font-family: 'Poppins', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.12em;
      text-shadow: 0 0 12px rgba(46,204,224,0.7);
    }

    /* ── Text ── */
    .loader-text {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.15em;
      margin: 0;
    }
    .dots span {
      animation: blink 1.2s infinite;
      opacity: 0;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }
  </style>

  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>

  <script>
    window.addEventListener('load', function () {
      var el = document.getElementById('loading-screen');
      if (el) {
        el.classList.add('fade-out');
        setTimeout(function () { el.remove(); }, 750);
      }
    });
  </script>
</body>
